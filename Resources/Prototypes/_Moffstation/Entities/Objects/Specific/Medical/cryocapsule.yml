# describe the cryocapsule item
- type: entity
  parent: BaseItem
  id : CryoCapsuleEmpty
  name: cryogenic capsule
  description: a miniature cryogenic pod able to keep organs alive in absence of a body.
  components:
  - type: CryoCapsule
  - type: FitInCryoLifeSupport
  - type: ContainerContainer
    containers:
      body_container: !type:ContainerSlot
        showEnts: true
  - type: ContainerFill
    containers:
      body_container:
      - CryoCapsuleContent
  - type: Lock
    unlockOnClick: False
    useAccess: False # temporary i'll probably add Medical access or something.
    # todo : add some damage visuals
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:EmptyAllContainersBehaviour
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: _Moffstation/Objects/Specific/Medical/cryocapsule.rsi
    state: empty2

# describe the organism inside the cryocapsule
- type: entity
  parent:
  - MobBloodstream
  - MobRespirator
  id: CryoCapsuleContent
  name: capsule content
  description: a set of organs inside a cryocapsule.
  suffix: DO NOT MAP
  components:
  - type: GibWhenOutsideContainer # your body cannot hold itself together
  - type: Body
  - type: ExposedOrgans
    exposedOrgans:
      brain: Brain
      eyes: Eyes
      lungs: Lungs
      heart: Heart
      stomach: Stomach
     # working on this currently.
#  - type: OrgansEffects
#    vitalOrgans: # you simply cannot live if any of those organs is missing.
#      organs:
#      - Brain
#      - Lungs # i debate if i include it (asphyxiation is already there)
#      - Heart
#      requireAll: True
#      onAbsent:
#      - CannotLiveStatusEffect
#    visionOrgans:
#      organs:
#      - Eyes
#      onAbsent:
#      - TemporaryBlindness
  # biology
  - type: Bloodstream
    bloodRefreshAmount : 0 # Cryoformol is not produced by the organs
    bloodReferenceSolution:
      reagents:
      - ReagentId: Cryoformol
        Quantity: 300
    bloodlossDamage:
      types:
        Bloodloss: 0.5
    bloodlossHealDamage:
      types:
        Bloodloss: -1
  # visuals
  - type: Sprite
    sprite: _Moffstation/Objects/Specific/Medical/cryocapsule.rsi
    layers:
    - state: base
    - state: brain
      map: ["enum.CryoCapsuleMobVisuals.Brain"]
      visible: false
    - state: eyes
      map: ["enum.CryoCapsuleMobVisuals.Eyes"]
      visible: false
    - state: stomach
      map: ["enum.CryoCapsuleMobVisuals.Stomach"]
      visible: false
    - state: lungs
      map: ["enum.CryoCapsuleMobVisuals.Lungs"]
      visible: false
    - state: heart
      map: ["enum.CryoCapsuleMobVisuals.Heart"]
      visible: false
  - type: Appearance
  - type: ItemMapper
    mapLayers:
      brain:
        whitelist:
          components:
          - Brain
      eyes:
        whitelist:
          tags:
          - Eyes
      stomach:
        whitelist:
          components:
          - Stomach
      lungs:
        whitelist:
          components:
          - Lung
      heart:
        whitelist:
          tags:
          - Heart
